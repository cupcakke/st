  <style>
    :root {
      color-scheme: dark light;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --blue: #0009cd;
      --blue-l: #0b00f6;
      --accent: #5f6af7;
      --green-soft: #ffffff;
      --fg: #f5f5f7;
      --fg2: rgba(245, 245, 247, .58);
      --fg3: rgba(245, 245, 247, .28);
      --bg: #000000;
      --sep: rgba(255, 255, 255, .055);
      --hover: rgba(255, 255, 255, .055);
      --liquid: rgba(246, 246, 250, .018);
      --liquid2: rgba(0, 40, 218, .033);
      --liquid3: rgba(255, 255, 255, .015);
      --liquid-border: rgba(0, 0, 0, .068);
      --liquid-border-strong: rgba(232, 232, 246, .118);
      --liquid-inset: rgba(255, 255, 255, .105);
      --liquid-edge: rgba(255, 255, 255, .08);
      --liquid-shadow: rgba(0, 0, 10, .34);
      --input-glow: rgba(11, 0, 246, .118);
      --send-border: rgba(0, 9, 205, .22);
      --send-inset: rgba(255, 255, 255, .18);
      --send-shadow: rgba(80, 90, 255, .18);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --fg: #000000;
        --fg2: rgba(0, 0, 0, .6);
        --fg3: rgba(0, 0, 0, .34);
        --bg: #f7f7fa;
        --sep: rgba(0, 9, 205, .07);
        --hover: rgba(0, 0, 0, .04);
        --liquid: rgba(255, 255, 255, .22);
        --liquid2: rgba(255, 255, 255, .36);
        --liquid3: rgba(0, 0, 0, .03);
        --liquid-border: rgba(255, 255, 255, .38);
        --liquid-border-strong: rgba(255, 255, 255, .58);
        --liquid-inset: rgba(255, 255, 255, .74);
        --liquid-edge: rgba(0, 80, 220, .12);
        --liquid-shadow: rgba(0, 0, 30, .09);
        --input-glow: rgba(0, 80, 255, .08);
        --send-border: rgba(0, 80, 255, .22);
        --send-inset: rgba(255, 255, 255, .42);
        --send-shadow: rgba(80, 90, 255, .12);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
      width: 100%;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      background: var(--bg);
    }

    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overscroll-behavior: none;
      background: var(--bg);
      color: var(--fg);
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      touch-action: pan-y;
    }

    input,
    textarea,
    [contenteditable="true"],
    .bubble,
    .ai-bubble,
    .bubble *,
    .ai-bubble *,
    pre,
    code,
    .cb,
    .cb * {
      user-select: text;
      -webkit-user-select: text;
      -webkit-touch-callout: default;
    }

    button,
    a,
    label,
    summary,
    svg,
    img {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    button,
    input,
    textarea {
      font: inherit;
      -webkit-appearance: none;
      appearance: none;
    }

    button {
      font-family: inherit;
    }

    textarea {
      border-radius: 0;
    }

    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: #000000;
    }

    #bg:before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #4b6cf7 0%, #000000 50%, #0009cd 100%);
      opacity: 0.15;
      filter: blur(80px);
    }

    #bg:after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.98));
    }

    @media (prefers-color-scheme: light) {
      #bg {
        background: linear-gradient(180deg, #f7f7fa 0%, #eeeef8 48%, #f5f5fb 100%);
      }

      #bg:before {
        background: linear-gradient(128deg, rgba(0, 9, 205, .08) 0%, rgba(80, 90, 255, .10) 42%, rgba(95, 106, 247, .04) 62%, transparent 80%);
        opacity: .72;
      }

      #bg:after {
        background: linear-gradient(180deg, rgba(255, 255, 255, .45), transparent 34%, rgba(80, 90, 255, .025) 100%);
      }
    }

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }

    .lg {
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, var(--liquid2), var(--liquid3) 48%, var(--liquid));
      border: .45px solid var(--liquid-border);
      box-shadow: 0 .7px 0 var(--liquid-inset) inset, 0 -.45px 0 rgba(0, 0, 0, .14) inset, 0 0 0 .35px rgba(80, 90, 255, .07), 0 14px 42px var(--liquid-shadow);
      backdrop-filter: blur(36px) saturate(190%) contrast(1.08) brightness(1.04);
      -webkit-backdrop-filter: blur(36px) saturate(190%) contrast(1.08) brightness(1.04);
      isolation: isolate;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
    }

    .lg:before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(150deg, rgba(255, 255, 255, .105), rgba(255, 255, 255, .022) 34%, rgba(80, 90, 255, .035) 58%, rgba(11, 0, 246, .025));
      mix-blend-mode: screen;
    }

    .lg:after {
      content: "";
      position: absolute;
      inset: .5px;
      border-radius: inherit;
      pointer-events: none;
      border: .35px solid rgba(255, 255, 255, .035);
      box-shadow: 0 0 18px rgba(80, 90, 255, .04) inset;
    }

    .lg>* {
      position: relative;
      z-index: 1;
    }

    #sidebar {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      max-width: 100%;
      z-index: 310;
      padding-top: var(--sat);
      padding-left: var(--sal);
      padding-right: var(--sar);
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform .42s cubic-bezier(.32, .72, 0, 1.18);
      will-change: transform;
      background: rgba(2, 8, 5, .18);
      backdrop-filter: blur(48px) saturate(185%) contrast(1.05);
      -webkit-backdrop-filter: blur(48px) saturate(185%) contrast(1.05);
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
    }

    @media (prefers-color-scheme: light) {
      #sidebar {
        background: rgba(250, 255, 252, .24);
      }
    }

    #sidebar.open {
      transform: translateX(0);
    }

    #sidebar.dragging {
      transition: none;
    }

    #sidebar[aria-hidden="true"] {
      pointer-events: none;
    }

    #sidebar[aria-hidden="false"] {
      pointer-events: auto;
    }

    .sb-backdrop {
      position: fixed;
      inset: 0;
      z-index: 309;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: opacity;
    }

    .sb-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .sb-hdr {
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border-bottom: .5px solid var(--sep);
      gap: 8px;
      flex-shrink: 0;
    }

    .sb-title {
      flex: 1;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sb-close,
    .hcard-del,
    .img-rm {
      border: none;
      cursor: pointer;
    }

    .sb-close {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--fg2);
      background: transparent;
    }

    .sb-close:active {
      transform: scale(.88);
      opacity: .7;
    }

    .sb-close svg {
      width: 17px;
      height: 17px;
    }

    #sb-search-bar {
      height: 0;
      visibility: hidden;
      overflow: hidden;
      transition: height .32s cubic-bezier(.34, 1.28, .64, 1), visibility .32s;
      flex-shrink: 0;
    }

    #sb-search-bar.open {
      height: 54px;
      visibility: visible;
    }

    .sb-si {
      height: 38px;
      margin: 8px 14px 6px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
    }

    .sb-si svg {
      width: 16px;
      height: 16px;
      fill: var(--fg3);
      flex-shrink: 0;
    }

    #sb-q {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: var(--fg);
      min-width: 0;
    }

    #sb-q::placeholder {
      color: var(--fg3);
    }

    #sb-q-cancel {
      background: transparent;
      border: none;
      color: var(--green-soft);
      font-size: 15px;
      cursor: pointer;
      width: 0;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
      white-space: nowrap;
      transition: width .2s, opacity .2s;
    }

    #sb-search-bar.open #sb-q-cancel {
      width: 52px;
      opacity: 1;
      pointer-events: auto;
    }

    .sb-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scrollbar-width: none;
      padding: 12px;
    }

    .sb-body::-webkit-scrollbar,
    #scroll-area::-webkit-scrollbar,
    .img-strip::-webkit-scrollbar,
    .src-chips::-webkit-scrollbar,
    #ta::-webkit-scrollbar {
      display: none;
    }

    .sb-pull-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 6px 0 0;
      font-size: 11px;
      color: var(--fg3);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }

    .sb-pull-hint svg {
      width: 12px;
      height: 12px;
      fill: var(--fg3);
    }

    #sidebar.pull-hinting .sb-pull-hint {
      opacity: 1;
    }

    .sb-new {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 13px;
      border-radius: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--green-soft);
      text-align: left;
    }

    .sb-new svg {
      width: 16px;
      height: 16px;
      fill: var(--green-soft);
      flex-shrink: 0;
    }

    .sb-new:active,
    .hcard:active {
      transform: scale(.97);
    }

    .sb-sec {
      font-size: 11px;
      font-weight: 600;
      color: var(--fg3);
      letter-spacing: .5px;
      text-transform: uppercase;
      padding: 2px 3px 8px;
      margin-top: 4px;
    }

    .hcard {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 12px;
      border-radius: 16px;
      cursor: pointer;
      margin-bottom: 6px;
      border: .5px solid transparent;
      background: transparent;
      transition: transform .22s cubic-bezier(.2, 1, .3, 1), background .14s, border-color .14s;
    }

    @media (hover: hover) and (pointer: fine) {
      .hcard:hover {
        background: var(--hover);
        backdrop-filter: blur(22px) saturate(170%);
        -webkit-backdrop-filter: blur(22px) saturate(170%);
        border-color: var(--liquid-border-strong);
      }
    }

    .hcard.active {
      background: linear-gradient(135deg, rgba(11, 0, 246, .075), rgba(80, 90, 255, .07));
      border-color: rgba(80, 90, 255, .25);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      box-shadow: 0 0 0 .35px rgba(80, 90, 255, .06), 0 8px 28px rgba(80, 90, 255, .05);
    }

    .hcard-body {
      flex: 1;
      min-width: 0;
    }

    .hcard-pre {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -.15px;
    }

    .hcard-pre mark {
      background: rgba(80, 90, 255, .18);
      color: var(--green-soft);
      border-radius: 3px;
      padding: 0 1px;
    }

    .hcard.active .hcard-pre {
      color: var(--green-soft);
    }

    .hcard-meta {
      font-size: 11px;
      color: var(--fg3);
      margin-top: 2px;
    }

    .hcard-del {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--fg3);
      opacity: 0;
      pointer-events: none;
    }

    .hcard-del svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .hcard:hover .hcard-del,
    .hcard:focus-within .hcard-del {
      opacity: 1;
      pointer-events: auto;
    }

    @media (pointer: coarse) {
      .hcard-del {
        opacity: 1;
        pointer-events: auto;
      }
    }

    .hcard-del:active {
      background: rgba(255, 59, 48, .15);
      color: rgba(255, 59, 48, .85);
      transform: scale(.85);
    }

    .hcard-pin {
      display: none;
      width: 11px;
      height: 11px;
      margin-right: 3px;
      vertical-align: middle;
    }

    .hcard.pinned .hcard-pin {
      display: inline-block;
    }

    .hcard-pin svg {
      fill: var(--green-soft);
    }

    .hcard-pre[contenteditable="true"] {
      outline: none;
      background: rgba(0, 255, 157, .1);
      border-radius: 7px;
      padding: 2px 5px;
      margin: -2px -5px;
      white-space: normal;
    }

    .h-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      padding: 48px 16px;
      text-align: center;
    }

    .h-empty svg {
      width: 28px;
      height: 28px;
      fill: var(--fg3);
      opacity: .45;
    }

    .h-empty p {
      font-size: 13px;
      color: var(--fg3);
      line-height: 1.5;
    }

    #content {
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 1;
      touch-action: pan-y;
    }

    #scroll-area {
      position: absolute;
      top: var(--sat);
      right: 0;
      bottom: 0;
      left: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      touch-action: pan-y;
      scrollbar-width: none;
      padding: 12px 0 84px;
      scroll-padding-top: 20px;
      scroll-padding-bottom: 20px;
    }

    #msg-list {
      display: flex;
      flex-direction: column;
      padding: 0 calc(14px + var(--sar)) 0 calc(14px + var(--sal));
      min-height: 100%;
    }

    .msg-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 8px;
    }

    .msg-group.u {
      align-items: flex-end;
    }

    .msg-group.a {
      align-items: flex-start;
    }

    .bubble,
    .ai-bubble {
      max-width: 100%;
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: -.18px;
      word-break: break-word;
      overflow-wrap: anywhere;
      position: relative;
    }

    .u .bubble {
      color: #f7fffb;
      max-width: 85%;
      padding: 9px 14px;
      border-radius: 20px;
      background: linear-gradient(138deg, rgba(0, 9, 205, .78) 0%, rgba(80, 90, 255, .72) 48%, rgba(95, 106, 247, .66) 100%);
      border: .45px solid rgba(160, 170, 255, .32);
      box-shadow: 0 5px 26px rgba(80, 90, 255, .15), 0 3px 18px rgba(11, 0, 246, .08), 0 1.2px 0 rgba(255, 255, 255, .22) inset, 0 -.7px 0 rgba(0, 0, 0, .16) inset;
      backdrop-filter: blur(24px) saturate(175%);
      -webkit-backdrop-filter: blur(24px) saturate(175%);
    }

    .ai-bubble {
      padding: 4px 0;
      background: transparent;
      color: var(--fg);
      border: none;
      box-shadow: none;
    }

    .md p {
      margin: 0 0 8px;
    }

    .md p:last-child {
      margin-bottom: 0;
    }

    .md h1,
    .md h2,
    .md h3 {
      margin: 12px 0 7px;
      line-height: 1.3;
      font-weight: 600;
    }

    .md h1 {
      font-size: 19px;
    }

    .md h2 {
      font-size: 17px;
    }

    .md h3 {
      font-size: 15.5px;
    }

    .md ul,
    .md ol {
      margin: 6px 0 8px;
      padding-left: 22px;
    }

    .md li {
      margin: 3px 0;
    }

    .md a {
      color: var(--green-soft);
      text-decoration: none;
    }

    .md hr {
      border: none;
      border-top: 1px solid var(--sep);
      margin: 12px 0;
    }

    .md .ic {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: .88em;
      background: rgba(255, 255, 255, .045);
      padding: 1.5px 5px;
      border-radius: 6px;
      border: .5px solid var(--liquid-border);
    }

    @media (prefers-color-scheme: light) {
      .md .ic {
        background: rgba(80, 90, 255, .06);
      }
    }

    .img-in-msg {
      border-radius: 16px;
      overflow: hidden;
      max-width: 220px;
      max-height: 185px;
      object-fit: cover;
      display: block;
      margin-bottom: 6px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, .2);
    }

    .err-bbl {
      display: inline-block;
      max-width: 90%;
      margin: 4px 0;
      padding: 9px 13px;
      font-size: 13.5px;
      line-height: 1.45;
      color: var(--fg);
      background: rgba(0, 255, 157, .095);
      border: .5px solid rgba(0, 255, 157, .2);
      border-radius: 15px;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .rcn-bar {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 5px 14px;
      padding: 8px 12px;
      background: rgba(0, 40, 218, .08);
      border: .5px solid rgba(0, 40, 218, .16);
      border-radius: 13px;
      font-size: 12px;
      color: rgba(80, 90, 255, .9);
    }

    .rcn-bar svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
      animation: spin 1.1s linear infinite;
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 2px;
    }

    .td {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--fg3);
      animation: tbounce 1.3s infinite ease-in-out;
    }

    .td:nth-child(2) {
      animation-delay: .18s;
    }

    .td:nth-child(3) {
      animation-delay: .36s;
    }

    @keyframes tbounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: .4;
      }

      30% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    @-webkit-keyframes tbounce {

      0%,
      60%,
      100% {

      font-weight: 600;

      height: 16px;
      fill: currentColor;
    }

      width: 36px;
      height: 36px;
      fill: currentColor;
    }

    .rp-screen-placeholder.hidden {
      display: none;
    }

    .rp-log {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--fg2, #bbb);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .rp-log-entry {
      display: flex;
      gap: 6px;
      align-items: flex-start;
      padding: 3px 0;
      border-bottom: .5px solid rgba(255, 255, 255, .04);
    }

      border-bottom: none;
    }

    .rp-log-icon {
      flex-shrink: 0;
      font-size: 13px;
      margin-top: 1px;
    }

    .rp-log-text {
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }

    .rp-log-entry.step .rp-log-text {
      color: var(--fg3, #888);
      font-style: italic;
    }

    .rp-log-entry.action .rp-log-text {
      color: #7dd3fc;
    }

    .rp-log-entry.status .rp-log-text {
      color: var(--fg2, #bbb);
    }

    .rp-log-entry.ok .rp-log-text {
      color: #60a5fa;
    }

    .rp-log-entry.warn .rp-log-text {
      color: #8fb2ff;
    }

    .rp-log-entry.err .rp-log-text {
      color: #f87171;
    }

      border-top: .5px solid rgba(255, 255, 255, .06);

      flex-direction: column;
      gap: 5px;
      flex-shrink: 0;
    }

    .rp-progress-track {
      height: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, .08);
      overflow: hidden;
    }

    .rp-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0078ff, #4b6cf7);
      border-radius: 2px;
      transition: width .4s ease;
      width: 0%;

    .rp-status-text {
      font-size: 11.5px;
      color: var(--fg3, #888);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rp-human-gate {

      bottom: 0;
      left: 0;
      right: 0;

      border-top: .5px solid rgba(80, 90, 255, .18);
    }

    .rp-human-inner {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .rp-human-icon {

      height: 22px;
      fill: #8fb2ff;
      flex-shrink: 0;
    }

    .rp-human-msg {

      color: var(--fg1, #eee);
      font-weight: 500;
    }

    .rp-human-row {
      display: flex;
      gap: 8px;
    }

    .rp-human-input {
      flex: 1;
      padding: 9px 12px;
      border-radius: 10px;
      border: .5px solid rgba(80, 90, 255, .22);
      background: rgba(255, 255, 255, .06);
      color: var(--fg1, #eee);
      font-size: 14px;
      font-family: monospace;
      outline: none;
      transition: border-color .15s;
    }

    .rp-human-input:focus {
      border-color: rgba(80, 90, 255, .55);
    }

    .rp-human-submit {
      padding: 9px 18px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #0078ff, #4b6cf7);
      color: #000;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
      flex-shrink: 0;
    }

    .rp-human-submit:hover {
      opacity: .85;
    }

    .rp-footer {
      padding: 10px 16px 14px;
      border-top: .5px solid rgba(255, 255, 255, .06);
      display: flex;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .rp-stop-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 16px;
      border: .5px solid rgba(255, 100, 100, .3);
      background: rgba(255, 60, 60, .1);
      color: #f87171;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }

    .rp-stop-btn:hover {

    }

      width: 14px;
      height: 14px;
      fill: currentColor;
    }

        flex: 1;
      }

  <script>
    (function () {

      var sid = null, msgs = [], imgs = [], textAtts = [], streaming = false, ctrl = null, retries = 0, retryT = null, hmeta = [], hmap = new Map(), deletedGroups = {}, sbOpen = false, searchQuery = "", searchOpen = false, loadGen = 0, attachmentSeq = 0, selectedMode = "fast";

        blocks.forEach(function (block) {

            emit(p.type || p.event || eventName, p.data || p);

        resize() {const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2)); this.dpr = dpr; this.w = Math.max(1, Math.round(innerWidth * dpr)); this.h = Math.max(1, Math.round(innerHeight * dpr)); canvas.width = this.w; canvas.height = this.h; canvas.style.width = innerWidth + 'px'; canvas.style.height = innerHeight + 'px'; gl.viewport(0, 0, this.w, this.h); if (!this.bg) {this.bg = fbo(this.w, this.h); this.vb = fbo(this.w, this.h); this.hb = fbo(this.w, this.h);} else {[this.bg, this.vb, this.hb].forEach(p => {gl.bindTexture(gl.TEXTURE_2D, p.texture); gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, this.w, this.h, 0, gl.RGBA, gl.HALF_FLOAT, null); p.w = this.w; p.h = this.h;});} }
        collect() {const sels = ['.glass-host', '.lg', '#sidebar', '.ibox', '.ctx-menu', '.as-group', '.as-cancel', '.cb', '.toast', '#stb', '.src-chip', '.srch-bar', '.file-chip', '.sb-si', '.sb-new', '.rp-container', '.u .bubble', '.hcard.active', '.rcn-bar']; const allEls = document.querySelectorAll(sels.join(',')); const seen = new Set(); const els = []; for (const e of allEls) {if (!seen.has(e) && e.offsetParent !== null) {seen.add(e); els.push(e);}} let n = 0; if (!this._radCache) this._radCache = new WeakMap(); const radCache = this._radCache; for (const el of els) {if (n >= MAX_SHAPES) break; const r = el.getBoundingClientRect(); if (r.width < 8 || r.height < 8) continue; this.rects[n * 4 + 0] = r.left * this.dpr; this.rects[n * 4 + 1] = r.top * this.dpr; this.rects[n * 4 + 2] = r.width * this.dpr; this.rects[n * 4 + 3] = r.height * this.dpr; let rad = radCache.get(el); if (rad === undefined) {const cs = getComputedStyle(el); const pr = parseFloat(cs.borderTopLeftRadius || '20'); rad = Number.isFinite(pr) ? pr : 20; radCache.set(el, rad);} this.radii[n] = rad * this.dpr; n++;} this.count = n;}
        bgPass(t) {gl.bindFramebuffer(gl.FRAMEBUFFER, this.bg.fb); gl.useProgram(this.bgProg); gl.uniform2f(this.bgLoc.uRes, this.w, this.h); gl.uniform1f(this.bgLoc.uTime, t); gl.drawArrays(gl.TRIANGLES, 0, 3);}
        blurPass(src, dst, dir) {gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fb); gl.useProgram(this.blurProg); gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, src.texture); gl.uniform1i(this.blurLoc.uTex, 0); gl.uniform2f(this.blurLoc.uTexel, 1 / this.w, 1 / this.h); gl.uniform2f(this.blurLoc.uDir, dir[0], dir[1]); gl.uniform1fv(this.blurLoc.uWeights, this.weights); gl.uniform1i(this.blurLoc.uRadius, this.radius); gl.drawArrays(gl.TRIANGLES, 0, 3);}
        mainPass(t) {gl.bindFramebuffer(gl.FRAMEBUFFER, null); gl.viewport(0, 0, this.w, this.h); gl.useProgram(this.mainProg); gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, this.bg.texture); gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, this.hb.texture); gl.uniform1i(this.mainLoc.uBg, 0); gl.uniform1i(this.mainLoc.uBlur, 1); gl.uniform2f(this.mainLoc.uRes, this.w, this.h); gl.uniform1f(this.mainLoc.uDpr, this.dpr); gl.uniform1f(this.mainLoc.uTime, t); gl.uniform1i(this.mainLoc.uShapeCount, this.count); gl.uniform4fv(this.mainLoc.uRects, this.rects); gl.uniform1fv(this.mainLoc.uRadii, this.radii); gl.uniform1f(this.mainLoc.uThickness, PROFILE.refThickness * this.dpr); gl.uniform1f(this.mainLoc.uRefFactor, PROFILE.refFactor); gl.uniform1f(this.mainLoc.uDispersion, PROFILE.refDispersion * this.dpr); gl.uniform1f(this.mainLoc.uFresnelRange, PROFILE.refFresnelRange * this.dpr); gl.uniform1f(this.mainLoc.uFresnelHardness, PROFILE.refFresnelHardness); gl.uniform1f(this.mainLoc.uFresnelFactor, PROFILE.refFresnelFactor); gl.uniform1f(this.mainLoc.uGlareRange, PROFILE.glareRange * this.dpr); gl.uniform1f(this.mainLoc.uGlareHardness, PROFILE.glareHardness); gl.uniform1f(this.mainLoc.uGlareFactor, PROFILE.glareFactor); gl.uniform1f(this.mainLoc.uGlareConvergence, PROFILE.glareConvergence); gl.uniform1f(this.mainLoc.uGlareOppositeFactor, PROFILE.glareOppositeFactor); gl.uniform1f(this.mainLoc.uGlareAngle, PROFILE.glareAngle); gl.uniform4f(this.mainLoc.uTint, PROFILE.tint.r / 255, PROFILE.tint.g / 255, PROFILE.tint.b / 255, PROFILE.tint.a); gl.uniform1i(this.mainLoc.uStep, PROFILE.step | 0); gl.drawArrays(gl.TRIANGLES, 0, 3);}

      }
      const r = new MultiPassRenderer(); let id = 0; const loop = t => {r.frame(t); id = requestAnimationFrame(loop);};
      addEventListener('resize', () => r.resize(), {passive: true});
      document.addEventListener('visibilitychange', () => {if (document.hidden && id) {cancelAnimationFrame(id); id = 0;} else if (!document.hidden && !id) id = requestAnimationFrame(loop);});
      id = requestAnimationFrame(loop);
    })();
